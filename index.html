<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>condominioeasy.it</title>

  <link rel="icon" type="image/png" href="/Logo.png">

  <meta property="og:title" content="AmministraBot - Condominio Easy">
  <meta property="og:description" content="App per Gestioni Condominiali">
  <meta property="og:image" content="https://condominioeasy.it/Logo.png">
  <meta property="og:url" content="https://condominioeasy.it/">
  <meta property="og:type" content="website">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Logo centrale */
    .logo-main {
      max-width: 500px;
      width: 60%;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.25));
      pointer-events: none;
      transition: opacity .4s;
      z-index: 10;
    }

    /* Logo rimbalzante */
    #bouncing-logo {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px;
      height: auto;
      z-index: 100;
      cursor: pointer;

      animation:
      bounceX 20s linear infinite alternate,
      bounceY 13s linear infinite alternate;

      transition: transform .2s ease, filter .2s ease;
    }

    #bouncing-logo:hover img {
      filter: drop-shadow(0 0 20px rgba(255,255,255,.4));
      transform: scale(1.05);
    }

    #bouncing-logo img {
      width:100%;
      height:auto;
    }

    @keyframes bounceX {
      from { left:0; }
      to { left:calc(100vw - 180px); }
    }

    @keyframes bounceY {
      from { top:0; }
      to { top:calc(100vh - 120px); }
    }

    /* Ripple */
    #ripple-overlay {
      position: fixed;
      border-radius: 50%;
      background: #1e293b;
      transform: scale(0);
      transition: transform .6s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      z-index: 9999;
    }

    /* Parte bassa pagina */
    .footer-wrapper{
      position:fixed;
      bottom:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      z-index:10;
    }

    /* Badge App Store */
    .appstore-link img{
      width:180px;
      height:auto;
      display:block;
      transition:transform .25s ease, opacity .25s ease;
    }

    .appstore-link:hover img{
      transform:scale(1.04);
      opacity:.9;
    }

    .footer{
      font-size:13px;
      opacity:.75;
      letter-spacing:.3px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .linkedin-link{
      color:#fff;
      display:flex;
      align-items:center;
      transition:opacity .2s;
    }

    .linkedin-link:hover{
      opacity:1;
      filter:drop-shadow(0 0 5px rgba(255,255,255,.5));
    }

    @media (max-width:600px){

      #bouncing-logo{
        width:130px;
        animation-duration:15s,9s;
      }

      @keyframes bounceX{
        from { left:0; }
        to { left:calc(100vw - 130px); }
      }

      @keyframes bounceY{
        from { top:0; }
        to { top:calc(100vh - 100px); }
      }

      .logo-main{
        width:85%;
      }

      .appstore-link img{
        width:150px;
      }
    }

  </style>
</head>

<body>

<div id="ripple-overlay"></div>

<div id="bouncing-logo" onclick="smoothRedirect(event)">
    <img src="/FullLogo_Transparent.png" alt="Accedi al Software">
</div>

<img src="/Logo.png" alt="Logo" class="logo-main" id="mainLogo">

<div class="footer-wrapper">

    <a
      href="https://apps.apple.com/it/app/amministrabot/id6779252185"
      target="_blank"
      rel="noopener noreferrer"
      class="appstore-link">

        <img src="/AppStore.PNG"
             alt="Scarica AmministraBot su App Store">

    </a>

    <div class="footer">
        Developed by Matteo Marangotto

        <a href="https://www.linkedin.com/in/matteo-mara/"
           target="_blank"
           rel="noopener noreferrer"
           class="linkedin-link">

            <svg xmlns="http://www.w3.org/2000/svg"
                 width="16"
                 height="16"
                 fill="currentColor"
                 viewBox="0 0 16 16">

                <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 0 1 .016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/>
            </svg>

        </a>
    </div>

</div>

<script>

let isTransitioning = false;

function smoothRedirect(e){

    if(isTransitioning) return;

    isTransitioning=true;

    const container=document.getElementById('bouncing-logo');
    const ripple=document.getElementById('ripple-overlay');

    const rect=container.getBoundingClientRect();

    container.style.animation='none';
    container.style.left=rect.left+'px';
    container.style.top=rect.top+'px';

    const clickX=e.clientX||(e.touches&&e.touches[0].clientX);
    const clickY=e.clientY||(e.touches&&e.touches[0].clientY);

    const w=window.innerWidth;
    const h=window.innerHeight;

    const maxDist=Math.hypot(
        Math.max(clickX,w-clickX),
        Math.max(clickY,h-clickY)
    );

    ripple.style.width=(maxDist*2)+'px';
    ripple.style.height=(maxDist*2)+'px';
    ripple.style.left=(clickX-maxDist)+'px';
    ripple.style.top=(clickY-maxDist)+'px';

    document.getElementById('mainLogo').style.opacity='0';

    requestAnimationFrame(()=>{
        ripple.style.transform='scale(1)';
    });

    setTimeout(()=>{
        window.location.href="https://app.condominioeasy.it/login";
    },600);

}

</script>

</body>
</html>
