<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>condominioeasy.it</title>

  <meta property="og:title" content="AmministraBot - Condominio Easy">
  <meta property="og:description" content="App per Gestioni Condominiali">
  <meta property="og:image" content="https://condominioeasy.it/Logo.png">
  <meta property="og:url" content="https://condominioeasy.it/">
  <meta property="og:type" content="website">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Immagine centrale fissa */
    .logo-main {
      max-width: 500px;
      width: 60%;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.25));
      pointer-events: none;
    }

    /* Logo rimbalzante e cliccabile */
    .bouncing-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px;
      height: auto;
      z-index: 100;
      cursor: pointer;
      animation: bounceX 20s linear infinite alternate, 
                 bounceY 13s linear infinite alternate;
      transition: transform 0.2s ease;
    }
    
    .bouncing-container:hover {
      transform: scale(1.05);
    }

    .bouncing-container img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    /* Animazione Rimbalzo */
    @keyframes bounceX {
      from { left: 0; }
      to { left: calc(100vw - 180px); }
    }
    @keyframes bounceY {
      from { top: 0; }
      to { top: calc(100vh - 100px); }
    }

    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 12px;
      opacity: .75;
      letter-spacing: .3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <a href="https://app.condominioeasy.it/login" class="bouncing-container">
    <img src="/FullLogo_Transparent.png" alt="Accedi al Software">
  </a>

  <img src="/Logo.png" alt="Logo" class="logo-main">

  <div class="footer">Developed by Matteo Marangotto</div>

</body>
</html>
