<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>condominioeasy.it</title>

  <link rel="icon" type="image/png" href="/Logo.png">

  <meta property="og:title" content="AmministraBot - Condominio Easy">
  <meta property="og:description" content="App per Gestioni Condominiali">
  <meta property="og:image" content="https://condominioeasy.it/Logo.png">
  <meta property="og:url" content="https://condominioeasy.it/">
  <meta property="og:type" content="website">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Immagine centrale fissa */
    .logo-main {
      max-width: 500px;
      width: 60%;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.25));
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* Logo rimbalzante Desktop */
    .bouncing-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px;
      height: auto;
      z-index: 100;
      cursor: pointer;
      animation: bounceX 20s linear infinite alternate, 
                 bounceY 13s linear infinite alternate;
      transition: transform 0.2s ease;
    }
    
    .bouncing-container:hover img {
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
      transform: scale(1.1);
    }

    .bouncing-container img {
      width: 100%;
      height: auto;
    }

    /* OTTIMIZZAZIONE MOBILE: 130px, lenta */
    @media (max-width: 600px) {
      .bouncing-container { 
        width: 130px; 
        animation-duration: 15s, 9s;
      }
      @keyframes bounceX {
        from { left: 0; }
        to { left: calc(100vw - 130px); }
      }
      @keyframes bounceY {
        from { top: 0; }
        to { top: calc(100vh - 100px); }
      }
      .logo-main { width: 85%; }
    }

    /* Animazione Desktop */
    @keyframes bounceX {
      from { left: 0; }
      to { left: calc(100vw - 180px); }
    }
    @keyframes bounceY {
      from { top: 0; }
      to { top: calc(100vh - 120px); }
    }

    /* CONTENITORE CREPE DINAMICHE */
    #crack-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: none;
      pointer-events: none;
    }

    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 12px;
      opacity: .75;
      letter-spacing: .3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="crack-overlay"></div>

  <div class="bouncing-container" onclick="breakAndRedirect(event)">
    <img src="/FullLogo_Transparent.png" alt="Accedi al Software">
  </div>

  <img src="/Logo.png" alt="Logo" class="logo-main" id="mainLogo">

  <div class="footer">Developed by Matteo Marangotto</div>

  <script>
    function breakAndRedirect(e) {
      // Ottieni le coordinate precise del click
      const clickX = e.clientX || (e.touches && e.touches[0].clientX);
      const clickY = e.clientY || (e.touches && e.touches[0].clientY);

      // Attiva l'overlay crack
      const overlay = document.getElementById('crack-overlay');
      overlay.style.display = 'block';
      
      // Feedback visivo immediato (schiarisci leggermente lo sfondo e oscura il logo)
      document.body.style.backgroundColor = "rgba(15, 23, 42, 0.9)";
      document.getElementById('mainLogo').style.opacity = '0.15';

      // Genera le crepe dinamicamente partendo dal punto del click
      generateRealCracks(clickX, clickY);

      // Reindirizza dopo 900ms
      setTimeout(() => {
        window.location.href = "https://app.condominioeasy.it/login";
      }, 900);
    }

    function generateRealCracks(x, y) {
      const overlay = document.getElementById('crack-overlay');
      // Pulisci eventuali crepe precedenti
      overlay.innerHTML = '';
      
      const numLines = 50; // Quante crepe principali generare
      const maxLength = Math.max(window.innerWidth, window.innerHeight); // Lunghezza massima crepe
      
      // Crea un SVG che copre tutto lo schermo
      let svgContent = `<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">`;
      
      for (let i = 0; i < numLines; i++) {
        // Angolo casuale (0-360 gradi)
        const angle = Math.random() * Math.PI * 2;
        // Lunghezza casuale della crepa
        const length = (Math.random() * maxLength * 0.7) + maxLength * 0.1;
        
        // Calcola il punto finale della crepa
        const endX = x + Math.cos(angle) * length;
        const endY = y + Math.sin(angle) * length;
        
        // Genera una linea "spezzata" (zig-zag casuale)
        let pathData = `M${x} ${y} `;
        let segments = Math.random() * 5 + 3; // Quanti zig-zag per crepa
        
        let currentX = x;
        let currentY = y;
        for (let j = 0; j < segments; j++) {
          let segmentLength = (length / segments) * (0.8 + Math.random() * 0.4);
          let currentAngle = angle + (Math.random() * 0.4 - 0.2); // Piccola variazione angolo
          currentX += Math.cos(currentAngle) * segmentLength;
          currentY += Math.sin(currentAngle) * segmentLength;
          pathData += `L${currentX} ${currentY} `;
        }
        
        // Aggiungi la linea bianca con larghezza e opacità casuale
        const strokeWidth = (Math.random() * 1.5 + 0.5);
        const opacity = (Math.random() * 0.6 + 0.2);
        svgContent += `<path d="${pathData}" stroke="white" stroke-width="${strokeWidth}" fill="none" opacity="${opacity}" />`;
      }
      
      svgContent += `</svg>`;
      overlay.innerHTML = svgContent;
    }
  </script>

</body>
</html>
