<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>condominioeasy.it</title>

  <link rel="icon" type="image/png" href="/Logo.png">

  <meta property="og:title" content="AmministraBot - Condominio Easy">
  <meta property="og:description" content="App per Gestioni Condominiali">
  <meta property="og:image" content="https://condominioeasy.it/Logo.png">
  <meta property="og:url" content="https://condominioeasy.it/">
  <meta property="og:type" content="website">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Immagine centrale fissa */
    .logo-main {
      max-width: 500px;
      width: 60%;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.25));
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* Logo rimbalzante */
    .bouncing-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px; /* Desktop */
      height: auto;
      z-index: 100;
      cursor: pointer;
      animation: bounceX 20s linear infinite alternate, 
                 bounceY 13s linear infinite alternate;
      transition: transform 0.2s ease;
      text-decoration: none;
    }
    
    /* Effetto GLOW al passaggio del mouse */
    .bouncing-container:hover img {
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
      transform: scale(1.1);
    }

    .bouncing-container img {
      width: 100%;
      height: auto;
    }

    /* OTTIMIZZAZIONE MOBILE */
    @media (max-width: 600px) {
      .bouncing-container { 
        width: 100px; /* Più piccolo su smartphone */
        animation-duration: 10s, 6s; /* Più veloce su schermi piccoli */
      }
      @keyframes bounceX {
        from { left: 0; }
        to { left: calc(100vw - 100px); }
      }
      @keyframes bounceY {
        from { top: 0; }
        to { top: calc(100vh - 80px); }
      }
      .logo-main { width: 80%; }
    }

    /* Animazione Desktop */
    @keyframes bounceX {
      from { left: 0; }
      to { left: calc(100vw - 180px); }
    }
    @keyframes bounceY {
      from { top: 0; }
      to { top: calc(100vh - 120px); }
    }

    /* EFFETTO SCHERMO ROTTO */
    #crack-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('https://www.transparentpng.com/download/crack/glass-crack-png-2.png') center center no-repeat;
      background-size: cover;
      z-index: 9999;
      display: none; /* Nascosto di default */
      pointer-events: none;
      filter: invert(1); /* Rende le crepe bianche/chiare per lo sfondo scuro */
    }

    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 12px;
      opacity: .75;
      letter-spacing: .3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="crack-overlay"></div>

  <div class="bouncing-container" onclick="breakAndRedirect()">
    <img src="/FullLogo_Transparent.png" alt="Accedi al Software">
  </div>

  <img src="/Logo.png" alt="Logo" class="logo-main" id="mainLogo">

  <div class="footer">Developed by Matteo Marangotto</div>

  <script>
    function breakAndRedirect() {
      // Mostra l'effetto crepe
      const overlay = document.getElementById('crack-overlay');
      overlay.style.display = 'block';
      
      // Nasconde gradualmente il logo centrale per enfasi
      document.getElementById('mainLogo').style.opacity = '0.3';

      // Reindirizza dopo 800 millisecondi (meno di un secondo)
      setTimeout(() => {
        window.location.href = "https://app.condominioeasy.it/login";
      }, 800);
    }
  </script>

</body>
</html>
