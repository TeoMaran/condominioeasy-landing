<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>condominioeasy.it</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* Immagine centrale: ripristinata grandezza originale e rimossa interazione */
    .logo-main {
      max-width: 500px;
      width: 60%;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.25));
      pointer-events: none; /* Impedisce che l'immagine sia trascinabile o cliccabile */
    }

    /* Logo rimbalzante: più grande e cliccabile */
    .bouncing-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px; /* Ingrandito da 120px a 180px */
      height: auto;
      z-index: 100;
      cursor: pointer;
      /* Rallentato: aumentati i secondi (20s e 13s) */
      animation: bounceX 20s linear infinite alternate, 
                 bounceY 13s linear infinite alternate;
      transition: transform 0.2s ease;
    }
    
    .bouncing-container:hover {
      transform: scale(1.05); /* Effetto feedback al passaggio del mouse */
    }

    .bouncing-container img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    /* Animazioni Rimbalzo */
    @keyframes bounceX {
      from { left: 0; }
      to { left: calc(100vw - 180px); } /* Sottrai la nuova larghezza del logo */
    }
    @keyframes bounceY {
      from { top: 0; }
      to { top: calc(100vh - 100px); } /* Sottrai l'altezza approssimativa */
    }

    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 12px;
      opacity: .75;
      letter-spacing: .3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <a href="https://app.condominioeasy.it/login" class="bouncing-container">
    <img src="/FullLogo_Transparent.png" alt="Accedi al Software">
  </a>

  <img src="/Logo.png" alt="Logo" class="logo-main">

  <div class="footer">Developed by Matteo Marangotto</div>

</body>
</html>
